<svg xmlns="http://www.w3.org/2000/svg" width="600" height="220" viewBox="0 0 600 220">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C97A"/>
      <stop offset="45%" style="stop-color:#B8965A"/>
      <stop offset="100%" style="stop-color:#7A6030"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B8965A;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#B8965A;stop-opacity:0.9"/>
      <stop offset="80%" style="stop-color:#B8965A;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#B8965A;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Top & bottom decorative lines -->
  <line x1="30" y1="56" x2="570" y2="56" stroke="url(#goldLine)" stroke-width="1"/>
  <line x1="30" y1="164" x2="570" y2="164" stroke="url(#goldLine)" stroke-width="1"/>

  <!-- Corner dots on lines -->
  <circle cx="56" cy="56" r="2.5" fill="#B8965A" opacity="0.7"/>
  <circle cx="544" cy="56" r="2.5" fill="#B8965A" opacity="0.7"/>
  <circle cx="56" cy="164" r="2.5" fill="#B8965A" opacity="0.7"/>
  <circle cx="544" cy="164" r="2.5" fill="#B8965A" opacity="0.7"/>

  <!-- Crown / Diamond ornament top center -->
  <polygon points="300,30 288,46 300,58 312,46" fill="url(#goldGrad)" opacity="0.95"/>
  <polygon points="300,34 291,46 300,54 309,46" fill="#E8C97A" opacity="0.4"/>
  <circle cx="300" cy="30" r="2.5" fill="#B8965A" opacity="0.8"/>

  <!-- CASSI text shadow -->
  <text x="303" y="148"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="92"
    font-weight="bold"
    letter-spacing="16"
    text-anchor="middle"
    fill="#000000"
    opacity="0.22"
    transform="translate(2.5,3)">CASSI</text>

  <!-- CASSI main text -->
  <text x="300" y="148"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="92"
    font-weight="bold"
    letter-spacing="16"
    text-anchor="middle"
    fill="url(#goldGrad)">CASSI</text>

  <!-- Tagline -->
  <text x="300" y="185"
    font-family="Arial, Helvetica, sans-serif"
    font-size="10.5"
    font-weight="normal"
    letter-spacing="6"
    text-anchor="middle"
    fill="#B8965A"
    opacity="0.72">TIMEPIECES  ·  EST. 2014</text>

  <!-- Small ornament dots flanking tagline -->
  <circle cx="146" cy="180" r="1.8" fill="#B8965A" opacity="0.5"/>
  <circle cx="454" cy="180" r="1.8" fill="#B8965A" opacity="0.5"/>
</svg>
